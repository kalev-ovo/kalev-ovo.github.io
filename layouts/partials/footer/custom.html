<!-- Live2D 看板娘 -->
<script src="https://cdn.jsdelivr.net/npm/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>
<script>
  (function() {
    if (window.innerWidth < 768) return;
    var script = document.querySelector('script[src*="L2Dwidget"]');
    if (!script) return;
    script.addEventListener('load', function() {
      if (typeof L2Dwidget === 'undefined') return;
      L2Dwidget.init({
        model: {
          jsonPath: 'https://cdn.jsdelivr.net/npm/live2d-widget-model-hijiki@1.0.5/assets/hijiki.model.json',
          scale: 1
        },
        display: {
          position: 'right',
          width: 140,
          height: 280,
          hOffset: -10,
          vOffset: -30
        },
        mobile: { show: false },
        react: { opacityDefault: 0.7, opacityOnHover: 0.2 },
        dialog: {
          enable: true,
          script: {
            'default': ['欢迎来到 Kalev 的博客～', '今天想学点什么呢？', '摸摸头～'],
            'hover': ['诶？', '有什么要帮忙的吗？'],
            'click': ['啊！不要戳我 >_<', '再点一下试试？']
          }
        }
      });
    });
  })();
</script>
