<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#2d1b3d"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e4718a"/>
      <stop offset="100%" stop-color="#b482dc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- 装饰圆 -->
  <circle cx="200" cy="150" r="100" fill="rgba(228,113,138,0.06)"/>
  <circle cx="1050" cy="500" r="140" fill="rgba(180,130,220,0.06)"/>
  <circle cx="100" cy="480" r="60" fill="rgba(125,211,252,0.04)"/>
  <!-- 标题 -->
  <text x="600" y="260" text-anchor="middle" font-family="sans-serif" font-size="64" font-weight="bold" fill="#fff">Kalev Yang</text>
  <rect x="420" y="290" width="360" height="4" rx="2" fill="url(#accent)"/>
  <!-- 副标题 -->
  <text x="600" y="360" text-anchor="middle" font-family="sans-serif" font-size="28" fill="rgba(255,255,255,0.65)">记录前端、算法与机器学习的学习与实践</text>
  <!-- 装饰樱花 -->
  <text x="160" y="200" font-size="32" fill="rgba(228,113,138,0.3)">🌸</text>
  <text x="1020" y="180" font-size="24" fill="rgba(180,130,220,0.3)">✨</text>
  <text x="900" y="480" font-size="28" fill="rgba(125,211,252,0.2)">💻</text>
  <text x="240" y="440" font-size="20" fill="rgba(228,113,138,0.2)">🍥</text>
  <!-- 底部装饰线 -->
  <line x1="100" y1="580" x2="500" y2="580" stroke="rgba(228,113,138,0.15)" stroke-width="2"/>
  <line x1="700" y1="580" x2="1100" y2="580" stroke="rgba(180,130,220,0.15)" stroke-width="2"/>
  <polygon points="590,580 600,570 610,580" fill="rgba(228,113,138,0.3)"/>
</svg>
